name: Fetch Weekly Tide Data

on:
  schedule:
    # 2am NZST (UTC+12) = 2pm UTC | 2am NZDT (UTC+13) = 1pm UTC
    # Run at 1pm UTC Mon + Thu to cover Sun night and Tue/Thu/Sat runs
    - cron: '0 13 * * 1'   # Monday 2am NZT
    - cron: '0 13 * * 4'   # Thursday 2am NZT
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  fetch-tides:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch tide data from NIWA
        env:
          NIWA_API_KEY: ${{ secrets.NIWA_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timedelta, timezone

          API_KEY = os.environ['NIWA_API_KEY']
          TODAY = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          # All coastal locations used in the tool
          LOCATIONS = {
              'mill bay':      {'lat': -36.9985, 'lng': 174.5320},
              'laingholm':     {'lat': -36.9701, 'lng': 174.5501},
              'cornwallis':    {'lat': -36.9985, 'lng': 174.5320},
              'huia bay':      {'lat': -36.9990, 'lng': 174.5600},
              'huia':          {'lat': -36.9990, 'lng': 174.5600},
              'armour bay':    {'lat': -36.9400, 'lng': 174.5150},
              'piha':          {'lat': -36.9538, 'lng': 174.4677},
              'karekare':      {'lat': -36.9753, 'lng': 174.4631},
              'whatipu':       {'lat': -37.0481, 'lng': 174.4511},
              'takapuna':      {'lat': -36.7870, 'lng': 174.7760},
              'browns bay':    {'lat': -36.7120, 'lng': 174.7400},
              'castor bay':    {'lat': -36.7580, 'lng': 174.7610},
              'devonport':     {'lat': -36.8290, 'lng': 174.8000},
              'bucklands beach':{'lat': -36.8840, 'lng': 174.9050},
              'onehunga':      {'lat': -36.9270, 'lng': 174.7840},
              'little shoal bay':{'lat': -36.8350, 'lng': 174.7280},
              'kohimarama':    {'lat': -36.8540, 'lng': 174.8380},
              'doves bay':     {'lat': -36.9985, 'lng': 174.5560},
              'weiti river entrance':{'lat': -36.5880, 'lng': 174.7140},
              'mahurangi harbour':{'lat': -36.5980, 'lng': 174.7350},
          }

          results = {}
          errors = []

          for name, coords in LOCATIONS.items():
              url = (
                  f"https://api.niwa.co.nz/tides/data"
                  f"?lat={coords['lat']}&long={coords['lng']}"
                  f"&numberOfDays=7&startDate={TODAY}&datum=LAT"
                  f"&apikey={API_KEY}"
              )
              try:
                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read())
                      results[name] = {
                          'lat': coords['lat'],
                          'lng': coords['lng'],
                          'fetched': TODAY,
                          'values': data.get('values', [])
                      }
                      print(f"  OK: {name} ({len(results[name]['values'])} values)")
              except Exception as e:
                  errors.append(name)
                  print(f"  FAIL: {name} — {e}")

          output = {
              'generated': datetime.now(timezone.utc).isoformat(),
              'startDate': TODAY,
              'days': 7,
              'locations': results,
              'errors': errors
          }

          with open('tides.json', 'w') as f:
              json.dump(output, f)

          print(f"\nDone: {len(results)} locations, {len(errors)} errors")
          if errors:
              print("Errors:", errors)
          PYEOF

      - name: Commit tides.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tides.json
          git diff --staged --quiet || git commit -m "chore: update tide data $(date -u +%Y-%m-%d)"
          git push
