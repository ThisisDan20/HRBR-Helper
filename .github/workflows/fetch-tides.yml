name: Fetch Weekly Tide Data

on:
  schedule:
    - cron: '0 13 * * 1'   # Monday 2am NZT (UTC+13)
    - cron: '0 13 * * 4'   # Thursday 2am NZT
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  fetch-tides:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch tide data from LINZ (free, no API key)
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime

          def fetch_linz_csv(year):
              url = f"https://static.charts.linz.govt.nz/tide-tables/maj-ports/csv/Auckland%20{year}.csv"
              req = urllib.request.Request(url, headers={'User-Agent': 'HRBR-Helper/1.0'})
              with urllib.request.urlopen(req, timeout=15) as resp:
                  return resp.read().decode('utf-8-sig')

          def parse_linz_csv(text):
              tides = []
              lines = text.strip().split('\n')[3:]
              for line in lines:
                  cols = line.strip().split(',')
                  if len(cols) < 6:
                      continue
                  try:
                      d, m, y = int(cols[0]), int(cols[2]), int(cols[3])
                  except ValueError:
                      continue
                  offset = '+13:00' if (m >= 10 or m <= 4) else '+12:00'
                  for i in range(4, len(cols) - 1, 2):
                      time_str = cols[i].strip()
                      height_str = cols[i+1].strip()
                      if not time_str or not height_str:
                          continue
                      try:
                          hh, mm = time_str.split(':')
                          height = float(height_str)
                          iso = f"{y:04d}-{m:02d}-{d:02d}T{int(hh):02d}:{int(mm):02d}:00{offset}"
                          tides.append({'time': iso, 'value': height})
                      except (ValueError, IndexError):
                          continue
              for i in range(len(tides)):
                  prev = tides[i-1]['value'] if i > 0 else float('inf')
                  nxt = tides[i+1]['value'] if i < len(tides)-1 else float('inf')
                  tides[i]['type'] = 'LOW' if tides[i]['value'] < prev and tides[i]['value'] < nxt else 'HIGH'
              return tides

          today = datetime.date.today()
          year = today.year
          print(f"Fetching LINZ tide data for {year}...")
          tides = []
          for y in ([year, year + 1] if today.month >= 11 else [year]):
              try:
                  tides += parse_linz_csv(fetch_linz_csv(y))
                  print(f"  OK {y}: {len(tides)} entries so far")
              except Exception as e:
                  print(f"  FAIL {y}: {e}")

          output = {
              'generated': datetime.datetime.utcnow().isoformat() + 'Z',
              'startDate': today.isoformat(),
              'source': 'LINZ',
              'locations': {
                  'auckland': {
                      'lat': -36.8485,
                      'lng': 174.7633,
                      'values': tides
                  }
              }
          }
          with open('tides.json', 'w') as f:
              json.dump(output, f)
          print(f"Done: {len(tides)} tide entries written to tides.json")
          PYEOF

      - name: Commit tides.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tides.json
          git diff --staged --quiet || git commit -m "chore: update tide data $(date -u +%Y-%m-%d)"
          git push
