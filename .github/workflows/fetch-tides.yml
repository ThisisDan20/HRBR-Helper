name: Fetch Weekly Tide Data

on:
  schedule:
    - cron: '0 13 * * 1'   # Monday 2am NZT
    - cron: '0 13 * * 4'   # Thursday 2am NZT
  workflow_dispatch:

jobs:
  fetch-tides:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch tide data from LINZ
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime

          # LINZ stations needed for HRBR runs
          # onehunga = Manukau Harbour (Cornwallis, Huia, Laingholm, Mill Bay, Whatipu, Whitford)
          # auckland = Waitemata/east coast/north shore/Hauraki Gulf (Browns Bay, Bucklands Beach,
          #            Castor Bay, Devonport, Kohimarama, Little Shoal Bay, Mahurangi, Matiatia,
          #            Waiheke, Weiti River)
          # anawhata = West coast ocean (Piha, Te Henga/Bethells, Karekare, Muriwai)
          STATIONS = {
              'auckland':  { 'csv': 'Auckland',  'lat': -36.8500, 'lng': 174.7667 },
              'onehunga':  { 'csv': 'Onehunga',  'lat': -36.9333, 'lng': 174.7833 },
              'anawhata':  { 'csv': 'Anawhata',  'lat': -36.9000, 'lng': 174.4500 },
          }

          def fetch_linz_csv(name, year):
              url = f"https://static.charts.linz.govt.nz/tide-tables/maj-ports/csv/{name.replace(' ', '%20')}%20{year}.csv"
              req = urllib.request.Request(url, headers={'User-Agent': 'HRBR-Helper/1.0'})
              with urllib.request.urlopen(req, timeout=15) as resp:
                  return resp.read().decode('utf-8-sig')

          def parse_linz_csv(text):
              tides = []
              lines = text.strip().split('\n')[3:]
              for line in lines:
                  cols = line.strip().split(',')
                  if len(cols) < 6:
                      continue
                  try:
                      d, m, y = int(cols[0]), int(cols[2]), int(cols[3])
                  except ValueError:
                      continue
                  offset = '+13:00' if (m >= 10 or m <= 4) else '+12:00'
                  for i in range(4, len(cols) - 1, 2):
                      time_str = cols[i].strip()
                      height_str = cols[i+1].strip()
                      if not time_str or not height_str:
                          continue
                      try:
                          hh, mm = time_str.split(':')
                          height = float(height_str)
                          iso = f"{y:04d}-{m:02d}-{d:02d}T{int(hh):02d}:{int(mm):02d}:00{offset}"
                          tides.append({'time': iso, 'value': height})
                      except (ValueError, IndexError):
                          continue
              for i in range(len(tides)):
                  prev = tides[i-1]['value'] if i > 0 else float('inf')
                  nxt = tides[i+1]['value'] if i < len(tides)-1 else float('inf')
                  tides[i]['type'] = 'LOW' if tides[i]['value'] < prev and tides[i]['value'] < nxt else 'HIGH'
              return tides

          today = datetime.date.today()
          year = today.year
          years = [year, year + 1] if today.month >= 11 else [year]

          output = {
              'generated': datetime.datetime.utcnow().isoformat() + 'Z',
              'startDate': today.isoformat(),
              'source': 'LINZ',
              'locations': {}
          }

          for key, info in STATIONS.items():
              tides = []
              for y in years:
                  try:
                      tides += parse_linz_csv(fetch_linz_csv(info['csv'], y))
                      print(f"  OK {key} {y}: {len(tides)} entries")
                  except Exception as e:
                      print(f"  FAIL {key} {y}: {e}")
              output['locations'][key] = {
                  'lat': info['lat'],
                  'lng': info['lng'],
                  'values': tides
              }

          with open('tides.json', 'w') as f:
              json.dump(output, f)

          total = sum(len(v['values']) for v in output['locations'].values())
          print(f"Done: {total} total tide entries across {len(output['locations'])} stations")
          PYEOF

      - name: Commit tides.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tides.json
          git diff --staged --quiet || git commit -m "chore: update tide data $(date -u +%Y-%m-%d)"
          git push
