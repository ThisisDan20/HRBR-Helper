<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HRBR Post Creator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
--forest:#1a5f3a; --gold:#ffc107; --strava-orange:#FC4C02;
--purple-blue-start:#667eea; --purple-blue-end:#764ba2;
}
body { font-family:Inter,sans-serif; background:#f0f4f0; padding:2rem; }
.container { max-width:1400px; margin:0 auto; }
.header { text-align:center; margin-bottom:2rem; }
.logo { max-width:400px; margin:0 auto 1rem; background:#fff; padding:1rem; border-radius:16px; box-shadow:0 4px 20px rgba(26,95,58,0.15); }
.logo img { width:100%; }
.posts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(400px,1fr)); gap:1.5rem; margin-bottom:1.5rem; }
.post-card { background:#fff; border:2px solid #dee2e6; border-radius:16px; padding:1.5rem; }
.post-card.tuesday { background:#e0f2fe; border-color:#7dd3fc; }
.post-card.thursday { background:#d1fae5; border-color:#6ee7b7; }
.post-card.saturday { background:#ffedd5; border-color:#fdba74; }
.output-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(400px,1fr)); gap:1.5rem; margin-top:1.5rem; margin-bottom:1.5rem; }
.output-grid .preview-card { margin-bottom:0; }
.email-row { margin-bottom:1rem; }
.email-box { background:#f8f9fa; border:2px solid #dee2e6; border-radius:12px; padding:1.5rem; }
.email-box-header { font-weight:700; color:var(--forest); font-size:1.1rem; margin-bottom:1rem; padding-bottom:1rem; border-bottom:2px solid var(--gold); }
@media (max-width: 1200px) { 
    .posts-grid { grid-template-columns:1fr; }
    .output-grid { grid-template-columns:1fr; } 
}
@media (max-width: 900px) { 
    .logo { max-width:250px; }
    body { padding:0.5rem; }
    .post-card { padding:1rem; }
}
@media (max-width: 600px) {
    .header h1 { font-size:1.5rem; }
    .header p { font-size:0.9rem; }
    .logo { max-width:200px; }
    body { padding:0.5rem; }
    .post-card, .email-box, .preview-card { padding:0.75rem; }
    .container { padding:0; }
}
.day-badge { background:var(--forest); color:#fff; padding:0.5rem 1.25rem; border-radius:8px; font-weight:800; text-transform:uppercase; }
.day-badge.tuesday { background:#0ea5e9; }
.day-badge.thursday { background:#059669; }
.day-badge.saturday { background:#f97316; color:#fff; }
.section { margin-bottom:1.25rem; }
.section-label { font-size:0.875rem; font-weight:600; color:var(--forest); margin-bottom:0.5rem; text-transform:uppercase; }
.photo-upload { border:2px dashed #dee2e6; border-radius:12px; padding:2rem; text-align:center; cursor:pointer; background:#e9ecef; }
.photo-upload:hover { border-color:var(--forest); }
.photo-upload.has-image { padding:0; border-color:var(--forest); }
.photo-preview { width:100%; height:300px; object-fit:cover; border-radius:10px; }
input[type="file"] { display:none; }
textarea, select, input[type="text"] { width:100%; padding:0.875rem; background:#fff; border:2px solid #dee2e6; border-radius:12px; font-family:Inter; font-size:0.95rem; }
textarea { min-height:120px; resize:vertical; }
textarea:focus, select:focus, input:focus { outline:none; border-color:var(--forest); }
.checkbox-container { display:flex; align-items:center; gap:0.75rem; padding:0.875rem; background:#fff; border:2px solid #dee2e6; border-radius:12px; cursor:pointer; }
.btn { width:100%; padding:1.25rem; background:var(--forest); border:none; border-radius:12px; color:#fff; font-weight:700; cursor:pointer; text-transform:uppercase; }
.btn:hover { background:#0f3d24; }
.output-section { background:#fff; border:2px solid #dee2e6; border-radius:16px; padding:2rem; margin-top:2rem; }
.preview-card { background:#f8f9fa; border:2px solid #dee2e6; border-radius:12px; padding:1.5rem; margin-bottom:1rem; }
.preview-card.tuesday { background:#e0f2fe; border-color:#7dd3fc; }
.preview-card.thursday { background:#d1fae5; border-color:#6ee7b7; }
.preview-card.saturday { background:#ffedd5; border-color:#fdba74; }
.social-section { background:linear-gradient(135deg, var(--purple-blue-start), var(--purple-blue-end)); border-radius:12px; padding:1.5rem; margin-bottom:1rem; }
.social-section .preview-title, .social-section .section-label { color:#fff; }
.social-section .preview-content { background:rgba(255,255,255,0.95); }
.strava-section { background:#fff8f6; border-radius:12px; overflow:hidden; margin-top:1rem; border:2px solid #FC4C02; }
.strava-section .strava-top { background:var(--strava-orange); padding:0.875rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
.strava-section .strava-header { color:#fff; font-weight:700; margin:0; }
.strava-section .strava-body { padding:1.25rem; }
.strava-field { margin-bottom:1rem; }
.strava-field label { display:block; font-size:0.75rem; color:var(--strava-orange); margin-bottom:0.4rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; }
.strava-field input[type="text"], .strava-field textarea { border-color:#fdc9b4; background:#fff; }
.strava-field input[type="text"]:focus, .strava-field textarea:focus { border-color:var(--strava-orange); outline:none; }
.strava-copy-btn { padding:0.5rem 0.75rem; background:var(--strava-orange); color:#fff; border:none; border-radius:8px; font-weight:700; font-size:0.8rem; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.strava-copy-btn:hover { background:#d93d00; }
.action-buttons { display:flex; gap:0.75rem; margin-top:1rem; }
.copy-btn, .download-btn { flex:1; padding:0.75rem; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:0.875rem; }
.copy-btn { background:var(--gold); color:#0f3d24; }
.download-btn { background:rgba(255,255,255,0.95); color:#667eea; }
.download-btn:hover { background:#fff; }
.copied-toast { position:fixed; bottom:2rem; right:2rem; background:var(--forest); color:#fff; padding:1rem 1.5rem; border-radius:12px; font-weight:600; z-index:1000; }
canvas { display:none; }
</style>
</head>
<body>
<div id="root"></div>
<canvas id="canvas"></canvas>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// CORS proxy — corsproxy.io uses ?url= format
const PROXY = 'https://corsproxy.io/?url=';
const proxify = (url) => PROXY + encodeURIComponent(url);

// Published CSV URL for the sheet (File > Share > Publish to web > CSV)
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdgUbXDdUsB4Tp8xBjTjRUwTYHwlN5fesVWRYJY2_2DT35GP4Qwy68zdKF4TiLXUtgGxgSRT0NX_5S/pub?output=csv&_=' + Date.now();

// Simple CSV parser — handles quoted fields
const parseCSV = (text) => {
    const rows = [];
    for (const line of text.split('\n')) {
        if (!line.trim()) continue;
        const cols = []; let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
            else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
            else cur += ch;
        }
        cols.push(cur.trim());
        rows.push(cols);
    }
    return rows;
};

    // Date calculation functions
    const getNextDayOfWeek = (targetDay) => {
        const today = new Date();
        const currentDay = today.getDay();
        const daysUntil = (targetDay - currentDay + 7) % 7 || 7;
        const nextDate = new Date(today);
        nextDate.setDate(today.getDate() + daysUntil);
        
        const day = nextDate.getDate();
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const month = months[nextDate.getMonth()];
        return `${day}-${month}`;
    };
    
    const nextTuesday = getNextDayOfWeek(2);
    const nextThursday = getNextDayOfWeek(4);
    const nextSaturday = getNextDayOfWeek(6);
    
    const TUESDAY_LOCATION = { name: "Mill Bay, Parau", link: "https://maps.app.goo.gl/yFLAw8GfskL5cRHC8", meetingSpot: "Mill Bay 800 Huia Road, Cornwallis, Auckland 0604", lat: -36.9985, lng: 174.5320 };
const TUESDAY_TEXT = `Tuesday ${nextTuesday} Mill Bay 5:15pm
First entrance after Parau. An hour of bush and beach to Cornwallis and back, 8km.`;

const THURSDAY_LOCATIONS = [
    { name: "Huia Rd/Exhibition Drive", link: "https://maps.app.goo.gl/cihV7R2A1bV6hEGo6",
      meetingSpot: "Opposite 394 Huia Road, Titirangi, Auckland 0604",
      lat: -36.9503, lng: 174.5711,
      text: `Thursday ${nextThursday} 5:45pm - Huia Rd/Exhibition Drive
Meet corner Huia Road, Exhibition Drive for a fun 6km/1hr jaunt around Arataki.` },
    { name: "Laingholm Beach", link: "https://maps.app.goo.gl/UPvJ3NvmEZCmLVsY8",
      meetingSpot: "Laingholm Beach, Laingholm Drive, Auckland 0604",
      lat: -36.9701, lng: 174.5501,
      text: `Thursday ${nextThursday} 6pm. Laingholm Beach 
7km beach, bush and coastal bash.
Meet: Laingholm beach on the shells.` },
    { name: "Curry Night, Waikumete, Glen Eden", link: "https://maps.app.goo.gl/BV1iQqPVdTJ5aGMK6",
      meetingSpot: "Thip Thai Restaurant, 26 Glenmall Place, Glen Eden, Auckland 0602",
      lat: -36.9169, lng: 174.6419,
      text: `Thursday ${nextThursday} Curry night, Waikumete
Meet outside Thip Thai restaurant at 6:00pm.
1hr, 7km trails, tracks, gravel and graves run around Waikumete cemetery.` }
];

function App() {
    const [saturdayLocations, setSaturdayLocations] = useState([]);
    const [loadingLocations, setLoadingLocations] = useState(true);
    const [tideInfo, setTideInfo] = useState({});
    const [posts, setPosts] = useState([
        { day: "Tuesday", photo: null, text: TUESDAY_TEXT, location: TUESDAY_LOCATION, useSavedLocation: true, difficulty: "Beginner-friendly", dogFriendly: true },
        { day: "Thursday", photo: null, text: THURSDAY_LOCATIONS[0].text, location: THURSDAY_LOCATIONS[0], selectedLocationIndex: 0, difficulty: "Beginner-friendly", dogFriendly: true },
        { day: "Saturday", photo: null, text: "", location: { name: "", link: "" }, selectedLocationIndex: 0, difficulty: "Beginner-friendly", dogFriendly: false }
    ]);
    const [showOutput, setShowOutput] = useState(false);
    const [copiedIndex, setCopiedIndex] = useState(null);
    const [weatherInfo, setWeatherInfo] = useState({});
    const [fetching, setFetching] = useState(false);
    const [tideStatus, setTideStatus] = useState('');
    const [errorMsg, setErrorMsg] = useState('');
    const [tideTable, setTideTable] = useState([]); // [{name, day, runTime, tide}]
    const [tideTableLoading, setTideTableLoading] = useState(true);
    const fileInputRefs = [useRef(), useRef(), useRef()];
    const canvasRef = useRef();


    useEffect(() => {
        canvasRef.current = document.getElementById('canvas');
        loadSaturdayLocations();
    }, []);

    // ── Weekly Tide Table ──────────────────────────────────────────────────────
    // Fixed run entries: Tuesday Mill Bay 5:15pm, Thursday Laingholm 6pm
    const FIXED_TIDE_RUNS = [
        { name: 'Mill Bay',       day: 'Tuesday',  hour: 17, min: 15, lat: -36.9985, lng: 174.5320 },
        { name: 'Laingholm',      day: 'Thursday', hour: 18, min: 0,  lat: -36.9701, lng: 174.5501 },
    ];

    const getRunDateForDay = (dayName, hour, min) => {
        const today = new Date();
        const target = { Tuesday: 2, Thursday: 4, Saturday: 6 }[dayName];
        const diff = (target - today.getDay() + 7) % 7 || 7;
        const d = new Date(today);
        d.setDate(today.getDate() + diff);
        const nzFmt = new Intl.DateTimeFormat('en-NZ', { timeZone: 'Pacific/Auckland', year: 'numeric', month: '2-digit', day: '2-digit' });
        const parts = nzFmt.formatToParts(d);
        const y = parts.find(p => p.type === 'year').value;
        const mo = parts.find(p => p.type === 'month').value;
        const dy = parts.find(p => p.type === 'day').value;
        const hh = String(hour).padStart(2, '0');
        const mm = String(min).padStart(2, '0');
        const month = d.getMonth() + 1;
        const offset = (month >= 10 || month <= 3) ? '+13:00' : '+12:00';
        return new Date(`${y}-${mo}-${dy}T${hh}:${mm}:00${offset}`);
    };

    const fetchTideForLocation = async (name, day, hour, min, lat, lng) => {
        try {
            const runTime = getRunDateForDay(day, hour, min);
            const nzDateStr = runTime.toLocaleDateString('en-NZ', {
                timeZone: 'Pacific/Auckland', year: 'numeric', month: '2-digit', day: '2-digit'
            }).split('/').reverse().join('-');
            const niwaUrl = `https://api.niwa.co.nz/tides/data?lat=${lat}&long=${lng}&numberOfDays=2&startDate=${nzDateStr}&datum=LAT`;
            const res = await fetch(proxify(niwaUrl), { headers: { 'x-apikey': NIWA_API_KEY } });
            if (!res.ok) return { name, day, runTime, tide: `Err ${res.status}` };
            const data = await res.json();
            const values = data.values || data.data || [];
            // Find nearest low tide to run time
            let lows = values.filter(v => v.type && v.type.toUpperCase() === 'LOW');
            if (!lows.length) lows = values.filter((v,i) => i > 0 && i < values.length-1 && v.value < values[i-1].value && v.value < values[i+1].value);
            if (!lows.length) return { name, day, runTime, tide: 'No data' };
            const runMs = runTime.getTime();
            lows.sort((a,b) => Math.abs(new Date(a.time)-runMs) - Math.abs(new Date(b.time)-runMs));
            const best = lows[0];
            const t = new Date(best.time);
            const localTime = t.toLocaleTimeString('en-NZ', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'Pacific/Auckland' }).toLowerCase().replace(' ', '');
            return { name, day, runTime, tide: `${best.value.toFixed(1)}m @ ${localTime}` };
        } catch(e) {
            return { name, day, runTime, tide: 'Error' };
        }
    };

    const loadTideTable = async (satLocations) => {
        setTideTableLoading(true);
        const runs = [...FIXED_TIDE_RUNS];
        // Add Saturday coastal locations from sheet
        for (const loc of (satLocations || saturdayLocations)) {
            if (!loc.coastal && !loc.tidalLocation) continue;
            let lat = loc.lat, lng = loc.lng;
            if (loc.tidalLocation) {
                const key = loc.tidalLocation.toLowerCase().trim();
                const ref = COASTAL_COORDS[key];
                if (ref) { lat = ref.lat; lng = ref.lng; }
            } else {
                const ref = getCoastalCoords(loc.name, loc.meetingSpot || '', '');
                if (ref) { lat = ref.lat; lng = ref.lng; }
            }
            if (!lat || !lng) continue;
            const displayName = loc.tidalLocation || loc.name;
            if (!runs.find(r => r.name.toLowerCase() === displayName.toLowerCase() && r.day === 'Saturday')) {
                runs.push({ name: displayName, day: 'Saturday', hour: 14, min: 0, lat, lng });
            }
        }
        // Fetch all in parallel
        const results = await Promise.all(runs.map(r => fetchTideForLocation(r.name, r.day, r.hour, r.min, r.lat, r.lng)));
        // Sort alphabetically by name, then by day order
        const dayOrder = { Tuesday: 1, Thursday: 2, Saturday: 3 };
        results.sort((a,b) => dayOrder[a.day] - dayOrder[b.day] || a.name.localeCompare(b.name));
        setTideTable(results);
        setTideTableLoading(false);
    };

    // Save Saturday location index to localStorage when it changes
    useEffect(() => {
        try {
            const satIdx = posts[2].selectedLocationIndex;
            if (satIdx !== undefined) localStorage.setItem('hrbr_sat_idx', satIdx);
        } catch(e) { /* localStorage unavailable */ }
    }, [posts[2]?.selectedLocationIndex]);

    const loadSaturdayLocations = async () => {
        try {
            setLoadingLocations(true);
            dbg('Fetching Saturday locations from published CSV...');
            const sheetUrl = proxify(SHEET_CSV);
            const response = await fetch(sheetUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            dbg('CSV length:', text.length, 'first 100:', text.substring(0,100));

            const allRows = parseCSV(text);
            if (allRows.length < 2) throw new Error('Sheet returned no rows');
            const headers = allRows[0].map(h => h.toLowerCase().trim());
            dbg('Headers:', headers.join(' | '));

            const colIdx = (label) => headers.indexOf(label.toLowerCase().trim());
            const iName        = colIdx('name');
            const iAvail       = colIdx('available');
            const iDesc        = colIdx('email/fb description');
            const iMeet        = colIdx('start/finish meeting spot');
            const iLink        = colIdx('google maps link');
            const iCoastal     = colIdx('coastal');
            const iTidalLoc    = colIdx('tidal location');
            const iDogFriendly = colIdx('dog friendly') >= 0 ? colIdx('dog friendly') : 5;
            const iDogReason  = colIdx('no dogs reason') >= 0 ? colIdx('no dogs reason') : colIdx('dog reason') >= 0 ? colIdx('dog reason') : -1;
            const iDifficulty  = colIdx('difficulty');
            dbg('Col map — name:%d avail:%d dog:%d diff:%d', iName, iAvail, iDogFriendly, iDifficulty);

            const getCol = (row, idx) => (idx >= 0 && idx < row.length) ? row[idx] : '';

            const locations = [];
            for (const row of allRows.slice(1)) {
                const name        = getCol(row, iName);
                const available   = getCol(row, iAvail).toLowerCase() === 'yes';
                const description = getCol(row, iDesc);
                const meetingSpot = getCol(row, iMeet);
                const mapLink     = getCol(row, iLink);
                const coastal     = getCol(row, iCoastal).toLowerCase() === 'yes';
                const tidalLocation = getCol(row, iTidalLoc);
                const dogFriendly = getCol(row, iDogFriendly).toLowerCase() === 'yes';
                const dogReason   = getCol(row, iDogReason);
                const difficulty  = getCol(row, iDifficulty);
                let lat = null, lng = null;
                if (mapLink) {
                    const m = mapLink.match(/[@!3d](-?\d+\.\d+)[,!4d](-?\d+\.\d+)/)
                           || mapLink.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
                    if (m) { lat = parseFloat(m[1]); lng = parseFloat(m[2]); }
                }
                if (available && name) {
                    locations.push({ name, description, link: mapLink, meetingSpot, lat, lng, coastal, tidalLocation, dogFriendly, dogReason, difficulty });
                    if (coastal) dbg('Coastal:', name, '| tidal ref:', tidalLocation || 'auto');
                }
            }

            dbg('Total locations found:', locations.length);
            setSaturdayLocations(locations);
            if (locations.length > 0) {
                setPosts(prevPosts => {
                    const newPosts = [...prevPosts];
                    let savedIdx = 0;
                    try { savedIdx = Math.min(parseInt(localStorage.getItem('hrbr_sat_idx') || '0'), locations.length - 1) || 0; } catch(e) {}
                    const selectedLocation = locations[savedIdx];
                    newPosts[2].selectedLocationIndex = savedIdx;
                    newPosts[2].location = selectedLocation;
                    newPosts[2].dogFriendly = selectedLocation.dogFriendly || false;
        newPosts[2].location = { ...newPosts[2].location, dogReason: selectedLocation.dogReason || '' };
                    newPosts[2].difficulty = 'Beginner-friendly';
                    const satDate = getNextSaturday();
                    const saturdayTitle = `Saturday ${satDate} 2pm 10km - ${selectedLocation.name}`;
                    const description = selectedLocation.description || '';
                    newPosts[2].text = description ? `${saturdayTitle}\n${description}` : saturdayTitle;
                    return newPosts;
                });
            }
            setLoadingLocations(false);
            loadTideTable(locations);
        } catch (error) {
            dbg('Error loading locations:', error);
            setLoadingLocations(false);
            // Still load tide table with just fixed runs
            loadTideTable([]);
            setErrorMsg(`⚠️ Could not load Saturday locations: ${error.message}. Check the sheet is shared (Anyone with the link → Viewer).`);
        }
    };

    const handlePhotoUpload = (index, event) => {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const newPosts = [...posts];
                newPosts[index].photo = { file, preview: e.target.result };
                setPosts(newPosts);
            };
            reader.readAsDataURL(file);
        }
    };

    const handleTextChange = (index, text) => {
        const newPosts = [...posts];
        newPosts[index].text = text;
        setPosts(newPosts);
    };

    const handleTuesdayToggle = (checked) => {
        const newPosts = [...posts];
        newPosts[0].useSavedLocation = checked;
        if (checked) {
            newPosts[0].location = TUESDAY_LOCATION;
            newPosts[0].text = TUESDAY_TEXT;
        }
        setPosts(newPosts);
    };

    const handleThursdaySelect = (index) => {
        const newPosts = [...posts];
        const selectedIndex = parseInt(index);
        newPosts[1].selectedLocationIndex = selectedIndex;
        newPosts[1].location = THURSDAY_LOCATIONS[selectedIndex];
        newPosts[1].text = THURSDAY_LOCATIONS[selectedIndex].text;
        newPosts[1].dogFriendly = true;
        newPosts[1].difficulty = 'Beginner-friendly';
        // Clear cache so next Generate fetches fresh env for new location
        envCache.current = {};
        setPosts(newPosts);
    };

    const getNextSaturday = () => {
        const today = new Date();
        const dayOfWeek = today.getDay();
        const daysUntilSaturday = (6 - dayOfWeek + 7) % 7 || 7;
        const nextSat = new Date(today);
        nextSat.setDate(today.getDate() + daysUntilSaturday);
        
        const day = nextSat.getDate();
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const month = months[nextSat.getMonth()];
        return `${day}-${month}`;
    };
    
    const handleSaturdaySelect = (index) => {
        const newPosts = [...posts];
        const selectedIndex = parseInt(index);
        const selectedLocation = saturdayLocations[selectedIndex];
        newPosts[2].selectedLocationIndex = selectedIndex;
        newPosts[2].location = selectedLocation;
        
        // Add Saturday title with date: "Saturday 15-Feb 2pm 10km - [location name]"
        const satDate = getNextSaturday();
        const saturdayTitle = `Saturday ${satDate} 2pm 10km - ${selectedLocation.name}`;
        const description = selectedLocation.description || '';
        newPosts[2].text = description ? `${saturdayTitle}\n${description}` : saturdayTitle;
        // Auto-populate dog friendly and difficulty from sheet data
        newPosts[2].dogFriendly = selectedLocation.dogFriendly || false;
        newPosts[2].difficulty = 'Beginner-friendly';
        
        // Clear cache so next Generate fetches fresh env for new location
        envCache.current = {};
        setPosts(newPosts);
    };
    const textWithWeather = (text, weather) => {
        if (!weather) return text;
        const lines = text.split('\n');
        lines[0] = `${lines[0]} ${weather.icon}${weather.temp}°C`;
        return lines.join('\n');
    };

    const difficultyLine = (post) => post.difficulty ? `\n🏃 ${post.difficulty}` : '';
    const dogLine = (post) => post.dogFriendly ? '\n🐕 Dog friendly' : (post.location.dogReason ? `\n🚫 No dogs: ${post.location.dogReason}` : '');

    const generateCaption = (post) => {
        const hashtags = "#running #trailrunning #aucklandrunning #runningcommunity #grouprun #outdoors";
        const tide = tideInfo[post.day];
        const weather = weatherInfo[post.day];
        const tideText = tide ? `\n🌊 Low Tide: ${tide}` : '';
        const address = post.location.meetingSpot || post.location.name;
        const bodyText = textWithWeather(post.text, weather);
        const mapLine = post.location.link ? `\n🗺️ Map link for the start/finish: ${post.location.link}` : '';
        return `${bodyText}${difficultyLine(post)}${dogLine(post)}${tideText}\n📍 ${address}.${mapLine}\n\n${hashtags}`;
    };
    
    const generateSubjectLine = (posts) => {
        // Extract day and location, with shortened day names
        const dayShort = { 'Tuesday': 'Tues', 'Thursday': 'Thurs', 'Saturday': 'Sat' };
        
        const locations = posts.map(post => {
            const dayMatch = post.text.match(/(Tuesday|Thursday|Saturday)/i);
            const day = dayMatch ? dayMatch[1] : post.day;
            const shortDay = dayShort[day] || day;
            
            // Shorten common location words to fit 255 char limit
            let location = post.location.name;
            location = location.replace(/Exhibition Drive/g, 'Exhibition Dr');
            location = location.replace(/Regional Park/g, 'Reg Park');
            location = location.replace(/Reserve/g, 'Res');
            location = location.replace(/Cemetery/g, 'Cem');
            
            return `${shortDay}: ${location}`;
        });
        
        const subject = `This week's runs - ${locations.join(' / ')}`;
        
        // Ensure under 255 chars
        if (subject.length > 255) {
            // Further truncate if needed
            return subject.substring(0, 252) + '...';
        }
        
        return subject.replace('This week\'s runs -', 'HRBR -');
    };
    

    // Known coastal reference coords for tide lookups
    // Used when a run visits the coast but starts inland
    const COASTAL_COORDS = {
        // West coast
        'mill bay':     { lat: -36.9985, lng: 174.5320 },
        'cornwallis':   { lat: -36.9985, lng: 174.5320 },
        'laingholm':    { lat: -36.9701, lng: 174.5501 },
        'whatipu':      { lat: -37.0481, lng: 174.4511 },
        'piha':         { lat: -36.9538, lng: 174.4677 },
        'karekare':     { lat: -36.9753, lng: 174.4631 },
        'bethells':     { lat: -36.8987, lng: 174.4314 },
        'muriwai':      { lat: -36.7936, lng: 174.4473 },
        'armour bay':   { lat: -36.9400, lng: 174.5150 },
        'little huia':  { lat: -37.0150, lng: 174.5560 },
        'huia bay':     { lat: -36.9990, lng: 174.5600 },
        'kaitarakihi':  { lat: -36.9985, lng: 174.5320 },
        // North Shore
        'takapuna':     { lat: -36.7870, lng: 174.7760 },
        'murrays bay':  { lat: -36.7290, lng: 174.7530 },
        'mairangi bay': { lat: -36.7380, lng: 174.7450 },
        'browns bay':   { lat: -36.7120, lng: 174.7400 },
        'long bay':     { lat: -36.6900, lng: 174.7340 },
        'torbay':       { lat: -36.6950, lng: 174.7370 },
        'castor bay':   { lat: -36.7580, lng: 174.7610 },
        'milford':      { lat: -36.7700, lng: 174.7680 },
        'devonport':    { lat: -36.8290, lng: 174.8000 },
        'cheltenham':   { lat: -36.8290, lng: 174.8000 },
        // East coast
        'mission bay':  { lat: -36.8540, lng: 174.8280 },
        'st heliers':   { lat: -36.8540, lng: 174.8480 },
        'kohimarama':   { lat: -36.8540, lng: 174.8380 },
        'bucklands beach': { lat: -36.8840, lng: 174.9050 },
        // Default
        'beach':        { lat: -36.9701, lng: 174.5501 },
    };

    // Returns {lat, lng} of the nearest coastal reference for tide lookups
    const getCoastalCoords = (locationName, meetingSpot, description) => {
        const allText = `${locationName} ${meetingSpot} ${description}`.toLowerCase();
        // Check specific place names first (more accurate)
        for (const [key, coords] of Object.entries(COASTAL_COORDS)) {
            if (key !== 'beach' && allText.includes(key)) return coords;
        }
        // Fall back to generic 'beach' default
        if (allText.includes('beach')) return COASTAL_COORDS['beach'];
        return null;
    };

    const COASTAL_PLACE_KEYWORDS = Object.keys(COASTAL_COORDS).filter(k => k !== 'beach');
    const COASTAL_GENERIC_KEYWORDS = ['beach', 'coastal', 'bay', 'tide'];

    const isCoastalLocation = (locationName, meetingSpot, description) => {
        const placeText = `${locationName} ${meetingSpot}`.toLowerCase();
        const descText = `${locationName} ${description}`.toLowerCase();
        return COASTAL_PLACE_KEYWORDS.some(k => placeText.includes(k))
            || COASTAL_GENERIC_KEYWORDS.some(k => descText.includes(k));
    };

    // Parse run time from post text, return Date object for that day
    const getRunDateTime = (post) => {
        const today = new Date();
        const currentDay = today.getDay();
        const targetDay = { Tuesday: 2, Thursday: 4, Saturday: 6 }[post.day];
        const daysUntil = (targetDay - currentDay + 7) % 7 || 7;
        const runDate = new Date(today);
        runDate.setDate(today.getDate() + daysUntil);

        // Extract time from text e.g. "5:15pm", "6pm", "2pm"
        const timeMatch = post.text.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
        let hour = 17, min = 0; // default 5pm
        if (timeMatch) {
            hour = parseInt(timeMatch[1]);
            min = parseInt(timeMatch[2] || '0');
            if (timeMatch[3].toLowerCase() === 'pm' && hour !== 12) hour += 12;
            if (timeMatch[3].toLowerCase() === 'am' && hour === 12) hour = 0;
        }

        // Build an ISO string in NZT (NZDT = UTC+13, NZST = UTC+12)
        // Use Intl to get the NZ date components for that calendar day
        const nzFormatter = new Intl.DateTimeFormat('en-NZ', {
            timeZone: 'Pacific/Auckland',
            year: 'numeric', month: '2-digit', day: '2-digit'
        });
        const parts = nzFormatter.formatToParts(runDate);
        const y = parts.find(p => p.type === 'year').value;
        const mo = parts.find(p => p.type === 'month').value;
        const d = parts.find(p => p.type === 'day').value;
        const hh = String(hour).padStart(2, '0');
        const mm = String(min).padStart(2, '0');

        // Determine NZ offset: NZDT (Oct-Apr) = +13:00, NZST (Apr-Oct) = +12:00
        const month = runDate.getMonth() + 1; // 1-based
        const offset = (month >= 10 || month <= 3) ? '+13:00' : '+12:00';
        return new Date(`${y}-${mo}-${d}T${hh}:${mm}:00${offset}`);
    };

    // === CONFIGURATION ===
    const DEBUG = false;
    const dbg = (...args) => { if (DEBUG) dbg(...args); };
    const CONFIG = {
        IMAGE_SIZE: 1080,
        LOGO_WIDTH: 250,
        LOGO_PADDING: 15,
        FONT_SIZE_DAY: 70,
        FONT_SIZE_DETAIL: 56,
        FONT_SIZE_ENV: 50,
        FONT_SIZE_DESC: 38,
        FONT_SIZE_ADDR: 32,
        TEXT_PADDING: 20,
        BOTTOM_MARGIN: 30,
        NIWA_API_KEY: 'Fv2IGDXXtSCx0wTvZMQZLqrZXzjelE59', // Free tier, read-only
        COLOR_FOREST: '#1a5f3a',
        COLOR_GOLD: '#ffc107',
        COLOR_TEXT: '#0f3d24',
    };
    const NIWA_API_KEY = CONFIG.NIWA_API_KEY;

    // WMO weather code → emoji icon
    const wmoIcon = (code) => {
        if (code === 0) return '☀️';
        if (code <= 2) return '⛅';
        if (code === 3) return '☁️';
        if (code <= 49) return '🌫️';
        if (code <= 67) return '🌧️';
        if (code <= 77) return '❄️';
        if (code <= 82) return '🌦️';
        if (code <= 86) return '🌨️';
        if (code <= 99) return '⛈️';
        return '🌡️';
    };

    const fetchTideInfo = async (post) => {
        const loc = post.location;
        
        // Gate: Saturday uses sheet coastal flag; Tue/Thu use keyword detection
        const isCoastal = post.day === 'Saturday'
            ? !!loc.coastal
            : isCoastalLocation(loc.name, loc.meetingSpot || '', post.text);
        if (!isCoastal) return null;

        // Coordinate priority for tides:
        // 1. Saturday with tidalLocation in sheet → lookup by name in COASTAL_COORDS
        // 2. Any run → try getCoastalCoords (keyword match in name/meetingSpot/text)
        // 3. Fallback to start coords
        let lat, lng;
        if (post.day === 'Saturday' && loc.tidalLocation) {
            // Use explicit tidal location from sheet
            const key = loc.tidalLocation.toLowerCase().trim();
            const tidalCoords = COASTAL_COORDS[key];
            if (tidalCoords) {
                lat = tidalCoords.lat;
                lng = tidalCoords.lng;
                dbg('Using sheet tidal location:', loc.tidalLocation, lat, lng);
            } else {
                dbg('Tidal location not found in COASTAL_COORDS:', loc.tidalLocation);
            }
        }
        if (!lat || !lng) {
            // Try keyword-based lookup
            const coastalRef = getCoastalCoords(loc.name, loc.meetingSpot || '', post.text);
            if (coastalRef) {
                lat = coastalRef.lat;
                lng = coastalRef.lng;
                dbg('Using coastal reference coords for', loc.name, lat, lng);
            } else {
                // Fallback to start coords
                lat = loc.lat;
                lng = loc.lng;
                dbg('Falling back to start coords for', loc.name, lat, lng);
            }
        }
        if (!lat || !lng) return null;
        try {
            const runTime = getRunDateTime(post);
            const nzDateStr = runTime.toLocaleDateString('en-NZ', {
                timeZone: 'Pacific/Auckland',
                year: 'numeric', month: '2-digit', day: '2-digit'
            }).split('/').reverse().join('-');
            
            // Try with x-apikey header (NIWA developer portal standard)
            const niwaUrl = `https://api.niwa.co.nz/tides/data?lat=${lat}&long=${lng}&numberOfDays=2&startDate=${nzDateStr}&datum=LAT`;
            dbg('Fetching tides:', nzDateStr, 'for', post.day, lat, lng);
            const res = await fetch(proxify(niwaUrl), { headers: { 'x-apikey': NIWA_API_KEY } });
            const rawText = await res.text();
            dbg('NIWA raw response status:', res.status, 'body:', rawText.substring(0, 400));
            if (!res.ok) { 
                dbg('NIWA tide error', res.status, rawText); 
                return `ERR:${res.status}`; // return error string so it shows in tide log
            }
            const data = JSON.parse(rawText);
            
            const values = data.values || data.data || [];
            // Try type === 'LOW' first (NIWA may include this field)
            // Fallback to local minima detection if not available
            let lows = values.filter(v => v.type && v.type.toUpperCase() === 'LOW');
            if (lows.length === 0) {
                // Fallback: local minima (value lower than both neighbours)
                lows = values.filter((v, i) => {
                    if (i === 0 || i === values.length - 1) return false;
                    return v.value < values[i-1].value && v.value < values[i+1].value;
                });
                dbg('Using local minima fallback, found:', lows.length);
            } else {
                dbg('Using type===LOW, found:', lows.length);
            }
            dbg('Low tides found:', lows.length, 'of', values.length);
            if (!lows.length) return null;
            
            const runMs = runTime.getTime();
            lows.sort((a, b) => Math.abs(new Date(a.time) - runMs) - Math.abs(new Date(b.time) - runMs));
            const best = lows[0];
            const t = new Date(best.time);
            const localTime = t.toLocaleTimeString('en-NZ', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'Pacific/Auckland' }).toLowerCase().replace(' ', '');
            return `${best.value.toFixed(1)}m @ ${localTime}`;
        } catch(e) {
            dbg('Tide fetch error', e);
            return null;
        }
    };

    const fetchWeatherInfo = async (post) => {
        const loc = post.location;
        const lat = loc.lat || -36.8485;
        const lng = loc.lng || 174.7633;
        try {
            const runTime = getRunDateTime(post);
            // Open-Meteo: free, no key, NZ coverage
            // Request hourly temp + weather code for the run date
            const dateStr = runTime.toISOString().split('T')[0];
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,weather_code&timezone=Pacific%2FAuckland&start_date=${dateStr}&end_date=${dateStr}`;
            const res = await fetch(url);
            if (!res.ok) { dbg('Open-Meteo error', res.status); return null; }
            const data = await res.json();
            const times = data.hourly?.time || [];
            const temps = data.hourly?.temperature_2m || [];
            const codes = data.hourly?.weather_code || [];
            if (!times.length) return null;
            // Find closest hour to run time
            const runHour = runTime.getHours();
            const idx = Math.min(runHour, times.length - 1);
            const temp = Math.round(temps[idx]);
            const icon = wmoIcon(codes[idx]);
            return { icon, temp };
        } catch(e) {
            dbg('Weather fetch error', e);
            return null;
        }
    };

    // --- Env data orchestration ---
    // Cache keyed by day+coords+date so identical runs don't re-hit APIs
    const envCache = React.useRef({});

    const cacheKey = (post) => {
        const loc = post.location;
        const coords = loc.lat && loc.lng ? `${loc.lat},${loc.lng}` : loc.name;
        const date = getRunDateTime(post).toISOString().split('T')[0];
        return `${post.day}-${coords}-${date}`;
    };

    const fetchEnvForPost = async (post) => {
        const key = cacheKey(post);
        if (envCache.current[key]) {
            dbg('Env cache hit for', post.day);
            return envCache.current[key];
        }
        const [tide, weather] = await Promise.all([
            fetchTideInfo(post),
            fetchWeatherInfo(post)
        ]);
        const result = { tide, weather };
        envCache.current[key] = result;
        return result;
    };

    const fetchAllEnvData = async (postsToFetch) => {
        setFetching(true);
        setTideStatus('Fetching...');
        setErrorMsg('');
        const tideMap = {};
        const weatherMap = {};
        const tideLog = [];
        let results;
        try {
            results = await Promise.all(postsToFetch.map(post => fetchEnvForPost(post).then(r => ({post, ...r}))));
        } catch(e) {
            dbg('Env fetch error:', e);
            setErrorMsg('⚠️ Could not fetch weather/tide data. Posts generated without environment info.');
            results = postsToFetch.map(post => ({ post, tide: null, weather: null }));
        }
        for (const { post, tide, weather } of results) {
            if (tide === null) {
                tideLog.push(`${post.day}: not coastal`);
            } else if (typeof tide === 'string' && tide.startsWith('ERR:')) {
                tideLog.push(`${post.day}: ✗ ${tide}`);
            } else if (tide) {
                tideMap[post.day] = tide;
                tideLog.push(`${post.day}: 🌊 ${tide}`);
            }
            if (weather) weatherMap[post.day] = weather;
        }
        setTideInfo(tideMap);
        setWeatherInfo(weatherMap);
        setTideStatus(tideLog.join(' | '));
        setFetching(false);
        return { tideMap, weatherMap };
    };

    const generateEmailText = (posts) => {
        let out = "Runs...";
        posts.forEach((post) => {
            const tide = tideInfo[post.day];
            const weather = weatherInfo[post.day];
            const tideText = tide ? `\n🌊 Low Tide: ${tide}` : '';
            const address = post.location.meetingSpot || post.location.name;
            const bodyText = textWithWeather(post.text, weather);
            const mapLine = post.location.link ? `\n🗺️ ${post.location.link}` : '';
            out += `\n\n${bodyText}${difficultyLine(post)}${dogLine(post)}${tideText}\n📍 ${address}.${mapLine}`;
        });
        return out;
    };

    const generateEmailTextHTML = (posts) => {
        let out = "<strong>Runs...</strong>";
        posts.forEach((post, index) => {
            const tide = tideInfo[post.day];
            const weather = weatherInfo[post.day];
            const tideText = tide ? `<br>🌊 Low Tide: ${tide}` : '';
            const address = post.location.meetingSpot || post.location.name;
            const bodyText = textWithWeather(post.text, weather);
            const lines = bodyText.split('\n').filter(l => l.trim());
            const firstLine = `<strong>${lines[0]}</strong>`;
            const rest = lines.slice(1).join('<br>');
            const mapLine = post.location.link 
                ? `<br>🗺️ <a href="${post.location.link}" target="_blank">${post.location.link}</a>` : '';
            const diffHtml = post.difficulty ? `<br>🏃 ${post.difficulty}` : '';
            const dogHtml = post.dogFriendly ? '<br>🐕 Dog friendly' : '';
            out += `<br><br>${firstLine}${rest ? '<br>' + rest : ''}${diffHtml}${dogHtml}${tideText}<br>📍 ${address}.${mapLine}`;
        });
        return out;
    };

    const generateInstagramImage = (post, tide = null, weather = null) => {
        return new Promise((resolve, reject) => {
            if (!post.photo) { 
                reject(new Error('No photo available'));
                return; 
            }
            
            // Load both images
            const img = new Image();
            const logoImg = new Image();
            let imagesLoaded = 0;
            
            const checkBothLoaded = () => {
                imagesLoaded++;
                if (imagesLoaded === 2) {
                    try {
                        renderImage();
                    } catch (error) {
                        reject(error);
                    }
                }
            };
            
            const renderImage = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const size = 1080;
                canvas.width = size;
                canvas.height = size;
                
                // Calculate crop to center
                const imgAspect = img.width / img.height;
                let sx, sy, sWidth, sHeight;
                
                if (imgAspect > 1) {
                    sHeight = img.height; sWidth = img.height;
                    sx = (img.width - sWidth) / 2; sy = 0;
                } else {
                    sWidth = img.width; sHeight = img.width;
                    sx = 0; sy = (img.height - sHeight) / 2;
                }
                
                // Draw cropped and centered image
                ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, size, size);
                
                // Helper function to draw text with white background
                const drawTextWithBackground = (text, x, y, fontSize, fontWeight = '700', padding = 20) => {
                    ctx.font = `${fontWeight} ${fontSize}px Inter`;
                    const metrics = ctx.measureText(text);
                    const textWidth = metrics.width;
                    const textHeight = fontSize * 1.2;
                    
                    // Draw white background
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    ctx.fillRect(x - padding, y - textHeight + padding/2, textWidth + padding*2, textHeight + padding);
                    
                    // Draw text
                    ctx.fillStyle = '#0f3d24';
                    ctx.fillText(text, x, y);
                };
                
                // Helper function to draw text with yellow background
                const drawTextWithYellowBG = (text, x, y, fontSize, fontWeight = '700', padding = 20) => {
                    ctx.font = `${fontWeight} ${fontSize}px Inter`;
                    const metrics = ctx.measureText(text);
                    const textWidth = metrics.width;
                    const textHeight = fontSize * 1.2;
                    
                    // Draw yellow background
                    ctx.fillStyle = '#ffc107';
                    ctx.fillRect(x - padding, y - textHeight + padding/2, textWidth + padding*2, textHeight + padding);
                    
                    // Draw text
                    ctx.fillStyle = '#0f3d24';
                    ctx.fillText(text, x, y);
                };
                
                // HRBR logo dimensions (calculated first so text can avoid it)
                const logoWidth = 250;
                const logoHeight = (logoImg.height / logoImg.width) * logoWidth;
                const logoPadding = 15;
                const logoX = size - logoWidth - 40 - logoPadding;
                const logoBottom = 40 - logoPadding + logoHeight + logoPadding * 2; // y where logo ends

                // Top overlay - Day, Time, and Location name with YELLOW background
                let y = 120;
                const fontSize = 56;  // location/time/distance
                const dayFontSize = 70; // DAY stays large
                
                // Returns max text width for a given y position - narrow if logo is in the way
                const maxTextWidth = (yPos) => {
                    if (yPos - dayFontSize < logoBottom) return logoX - 60;
                    return size - 160;
                };
                
                // Parse first line to extract components
                const firstLine = post.text.split('\n')[0];
                const dayMatch = firstLine.match(/^(Tuesday|Thursday|Saturday)/i);
                const dateMatch = firstLine.match(/(\d{1,2}-\w{3})/);
                const timeMatch = firstLine.match(/(\d{1,2}(?::\d{2})?\s*(?:am|pm))/i);
                // Search entire text for distance (not just first line)
                const distanceMatch = post.text.match(/(\d+km)/i);
                
                // 1. Day + Distance (if available)
                const dayName = dayMatch ? dayMatch[1].toUpperCase() : post.day.toUpperCase();
                const line1 = distanceMatch ? `${dayName}, ${distanceMatch[1]}` : dayName;
                drawTextWithYellowBG(line1, 40, y, dayFontSize, '900');
                y += dayFontSize * 1.3;
                
                // 2. Date + Time
                let line2 = '';
                if (dateMatch) line2 += dateMatch[1];
                if (timeMatch) line2 += (line2 ? ', ' : '') + timeMatch[1];
                if (line2) {
                    drawTextWithYellowBG(line2, 40, y, fontSize, '700');
                    y += fontSize * 1.3;
                }
                
                // 3. Location name (may wrap) — respect logo zone
                const locationText = post.location.name;
                const words = locationText.split(' ');
                let line = '';
                
                ctx.font = `700 ${fontSize}px Inter`;
                for (let word of words) {
                    const testLine = line + word + ' ';
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxTextWidth(y) && line !== '') {
                        drawTextWithYellowBG(line.trim(), 40, y, fontSize, '700');
                        y += fontSize * 1.3;
                        line = word + ' ';
                    } else {
                        line = testLine;
                    }
                }
                if (line.trim()) {
                    drawTextWithYellowBG(line.trim(), 40, y, fontSize, '700');
                }
                
                // Add tide info
                if (tide) {
                    y += fontSize * 1.3;
                    dbg('Drawing tide on image:', tide);
                    drawTextWithYellowBG(`🌊 Low Tide: ${tide}`, 40, y, 50, '600');
                }
                
                // Add weather info
                if (weather) {
                    y += fontSize * 1.3;
                    drawTextWithYellowBG(`${weather.icon} ${weather.temp}°C`, 40, y, 50, '600');
                }
                
                // HRBR logo - white background + logo (only if loaded)
                if (logoImg.naturalWidth > 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    ctx.fillRect(logoX - logoPadding, 40 - logoPadding, 
                                size - (logoX - logoPadding), logoHeight + logoPadding*2);
                    ctx.drawImage(logoImg, logoX, 40, logoWidth, logoHeight);
                }
                
                // Bottom - Full Description and Address
                const bottomMaxWidth = size - 100;
                const fullDesc = post.text;
                const descLines = fullDesc.split('\n').filter(l => l.trim());
                
                // Show all lines for all days
                const linesToShow = Math.min(3, descLines.length);
                
                // Estimate total height needed
                const lineHeight = 50;
                const addressHeight = post.location.meetingSpot ? 84 : 0;
                const bottomMargin = 30; // Keep text away from bottom edge
                const totalHeight = (linesToShow * lineHeight) + addressHeight + 40;
                let bottomY = size - totalHeight - bottomMargin;
                
                // Draw description lines
                ctx.font = '600 38px Inter';
                for (let i = 0; i < linesToShow; i++) {
                    const descLine = descLines[i];
                    const dWords = descLine.split(' ');
                    let currentLine = '';
                    
                    for (let word of dWords) {
                        const testLine = currentLine + word + ' ';
                        const metrics = ctx.measureText(testLine);
                        if (metrics.width > bottomMaxWidth && currentLine !== '') {
                            drawTextWithBackground(currentLine.trim(), 40, bottomY, 38, '600', 15);
                            bottomY += lineHeight;
                            currentLine = word + ' ';
                        } else {
                            currentLine = testLine;
                        }
                    }
                    if (currentLine.trim()) {
                        drawTextWithBackground(currentLine.trim(), 40, bottomY, 38, '600', 15);
                        bottomY += lineHeight;
                    }
                }
                
                // Draw meeting address if available
                if (post.location.meetingSpot) {
                    bottomY += 15;
                    ctx.font = '500 32px Inter';
                    const addressWords = post.location.meetingSpot.split(' ');
                    let addressLine = '';
                    let addressLineCount = 0;
                    const maxAddressLines = 2;
                    
                    for (let word of addressWords) {
                        const testLine = addressLine + word + ' ';
                        const metrics = ctx.measureText(testLine);
                        if (metrics.width > bottomMaxWidth && addressLine !== '' && addressLineCount < maxAddressLines) {
                            drawTextWithBackground(addressLine.trim(), 40, bottomY, 32, '500', 12);
                            bottomY += 42;
                            addressLineCount++;
                            addressLine = word + ' ';
                        } else {
                            addressLine = testLine;
                        }
                    }
                    if (addressLine.trim() && addressLineCount < maxAddressLines) {
                        drawTextWithBackground(addressLine.trim(), 40, bottomY, 32, '500', 12);
                    }
                }
                
                // Convert to blob
                canvas.toBlob((blob) => {
                    resolve(URL.createObjectURL(blob));
                }, 'image/jpeg', 0.95);
            };
            
            img.onload = checkBothLoaded;
            logoImg.onload = checkBothLoaded;
            
            img.onerror = () => reject(new Error('Failed to load photo'));
            logoImg.onerror = () => {
                // Logo missing - render image without it by counting as loaded
                imagesLoaded++;
                if (imagesLoaded === 2) { try { renderImage(); } catch(err) { reject(err); } }
            };
            // crossOrigin='anonymous' required so canvas.toBlob() isn't tainted
            img.crossOrigin = 'anonymous';
            logoImg.crossOrigin = 'anonymous';
            img.src = post.photo.preview;
            logoImg.src = "HRBR_logo.jpg";
        });
    };

    const copyToClipboard = (text, index) => {
        navigator.clipboard.writeText(text);
        setCopiedIndex(index);
        setTimeout(() => setCopiedIndex(null), 2000);
    };

    const downloadInstagramImage = async (post) => {
        if (!post.photo) {
            alert('Please upload a photo first!');
            return;
        }
        try {
            const tide = tideInfo[post.day];
            const weather = weatherInfo[post.day];
            dbg('Downloading image with tide:', post.day, tide, 'weather:', weather);
            const imageUrl = await generateInstagramImage(post, tide, weather);
            if (!imageUrl) {
                alert('Error generating image');
                return;
            }
            const link = document.createElement('a');
            link.href = imageUrl;
            link.download = `${post.day.toLowerCase()}-instagram.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(imageUrl), 100);
        } catch (error) {
            dbg('Download error:', error);
            setErrorMsg('⚠️ Error generating image: ' + error.message + '. Make sure a photo is uploaded.');
        }
    };

    const generateStravaEvent = (post) => {
        const tide = tideInfo[post.day];
        const weather = weatherInfo[post.day];
        const tideText = tide ? `\n🌊 Low Tide: ${tide}` : '';
        const address = post.location.meetingSpot || post.location.name;
        const bodyText = textWithWeather(post.text, weather);
        return {
            title: post.text.split('\n')[0] || `${post.day} Group Run - HRBR`,
            type: "Group Run",
            description: `${bodyText}${difficultyLine(post)}${dogLine(post)}${tideText}\n📍 ${address}.${post.location.link ? '\n🗺️ ' + post.location.link : ''}`,
            location: post.location.meetingSpot || post.location.name,
            mapLink: post.location.link
        };
    };

    return (
        <div className="container">
            <div className="header">
                <div style={{display:'flex', alignItems:'flex-start', gap:'2rem', flexWrap:'wrap', justifyContent:'center'}}>
                    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'0.75rem', flexShrink:0}}>
                        <div className="logo" style={{maxWidth:'280px', margin:0}}>
                            <img src="HRBR_logo.jpg" alt="Huia Road Bush Runners" />
                        </div>
                        <div style={{textAlign:'center'}}>
                            <h1 style={{color:'var(--forest)', marginBottom:'0.25rem'}}>Post Creator</h1>
                            <p style={{color:'#6c757d', fontSize:'0.85rem'}}>Create your weekly running posts</p>
                            <p style={{color:'#6c757d', fontSize:'0.7rem', marginTop:'0.2rem'}}>v3.6</p>
                        </div>
                    </div>
                    <div style={{flex:1, minWidth:'320px', background:'white', borderRadius:'12px', padding:'1rem', boxShadow:'0 2px 8px rgba(26,95,58,0.1)', border:'2px solid #dee2e6'}}>
                        <div style={{fontWeight:700, color:'var(--forest)', fontSize:'0.9rem', marginBottom:'0.75rem', paddingBottom:'0.5rem', borderBottom:'2px solid var(--gold)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <span>🌊 Weekly Low Tides at Run Start</span>
                            <button onClick={() => loadTideTable(saturdayLocations)} style={{background:'none', border:'1px solid var(--forest)', borderRadius:'6px', color:'var(--forest)', cursor:'pointer', fontSize:'0.75rem', padding:'0.2rem 0.5rem'}}>↺ Refresh</button>
                        </div>
                        {tideTableLoading ? (
                            <div style={{color:'#6c757d', fontSize:'0.85rem', padding:'0.5rem'}}>⏳ Loading tides...</div>
                        ) : tideTable.length === 0 ? (
                            <div style={{color:'#6c757d', fontSize:'0.85rem', padding:'0.5rem'}}>No coastal locations found.</div>
                        ) : (
                            <table style={{width:'100%', borderCollapse:'collapse', fontSize:'0.82rem'}}>
                                <thead>
                                    <tr style={{borderBottom:'1px solid #dee2e6'}}>
                                        <th style={{textAlign:'left', padding:'0.3rem 0.5rem', color:'var(--forest)', fontWeight:600}}>Location</th>
                                        <th style={{textAlign:'left', padding:'0.3rem 0.5rem', color:'var(--forest)', fontWeight:600}}>Day</th>
                                        <th style={{textAlign:'left', padding:'0.3rem 0.5rem', color:'var(--forest)', fontWeight:600}}>Run Start</th>
                                        <th style={{textAlign:'left', padding:'0.3rem 0.5rem', color:'var(--forest)', fontWeight:600}}>Low Tide</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {tideTable.map((row, i) => {
                                        const runTimeStr = row.runTime ? row.runTime.toLocaleTimeString('en-NZ', {hour:'numeric', minute:'2-digit', hour12:true, timeZone:'Pacific/Auckland'}).toLowerCase().replace(' ', '') : '';
                                        const dayColors = { Tuesday:'#e0f2fe', Thursday:'#d1fae5', Saturday:'#ffedd5' };
                                        return (
                                            <tr key={i} style={{borderBottom:'1px solid #f0f0f0', background: i%2===0 ? 'transparent' : '#fafafa'}}>
                                                <td style={{padding:'0.35rem 0.5rem', fontWeight:500, textAlign:'left'}}>{row.name}</td>
                                                <td style={{padding:'0.35rem 0.5rem', textAlign:'left'}}>
                                                    <span style={{background:dayColors[row.day]||'#eee', padding:'0.1rem 0.4rem', borderRadius:'4px', fontSize:'0.75rem', fontWeight:600}}>{row.day}</span>
                                                </td>
                                                <td style={{padding:'0.35rem 0.5rem', color:'#6c757d', textAlign:'left'}}>{runTimeStr}</td>
                                                <td style={{padding:'0.35rem 0.5rem', fontWeight:600, textAlign:'left', color: row.tide.startsWith('0.') || row.tide.startsWith('Err') ? '#dc3545' : 'var(--forest)'}}>{row.tide}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>
            </div>

            <div className="posts-grid">
                {posts.map((post, index) => (
                    <div key={index} className={`post-card ${post.day.toLowerCase()}`}>
                        <div style={{marginBottom:'1.5rem', paddingBottom:'1rem', borderBottom:'2px solid var(--gold)'}}>
                            <div className={`day-badge ${post.day.toLowerCase()}`}>{post.day}</div>
                        </div>

                        <div className="section">
                            <div className="section-label">Photo</div>
                            <div className={`photo-upload ${post.photo ? 'has-image' : ''}`}
                                 onClick={() => fileInputRefs[index].current.click()}>
                                {post.photo ? (
                                    <img src={post.photo.preview} className="photo-preview" />
                                ) : (
                                    <div>Click to upload photo</div>
                                )}
                            </div>
                            <input ref={fileInputRefs[index]} type="file" accept="image/*"
                                   onChange={(e) => handlePhotoUpload(index, e)} />
                        </div>

                        <div className="section">
                            <div className="section-label">Caption Text</div>
                            <textarea value={post.text}
                                      onChange={(e) => handleTextChange(index, e.target.value)} />
                        </div>

                        <div className="section">
                            <div className="section-label">Location</div>
                            
                            {index === 0 && (
                                <label className="checkbox-container">
                                    <input type="checkbox" checked={post.useSavedLocation}
                                           onChange={(e) => handleTuesdayToggle(e.target.checked)} />
                                    <span>Use Tuesday default location</span>
                                </label>
                            )}

                            {index === 1 && (
                                <select value={post.selectedLocationIndex}
                                        onChange={(e) => handleThursdaySelect(e.target.value)}>
                                    {THURSDAY_LOCATIONS.map((loc, i) => (
                                        <option key={i} value={i}>{loc.name}</option>
                                    ))}
                                </select>
                            )}

                            {index === 2 && (
                                loadingLocations ? (
                                    <div style={{padding:'0.875rem', background:'#e9ecef', borderRadius:'12px', color:'#6c757d'}}>
                                        Loading Saturday locations...
                                    </div>
                                ) : saturdayLocations.length > 0 ? (
                                    <select value={post.selectedLocationIndex}
                                            onChange={(e) => handleSaturdaySelect(e.target.value)}>
                                        {saturdayLocations.map((loc, i) => (
                                            <option key={i} value={i}>{loc.name}</option>
                                        ))}
                                    </select>
                                ) : (
                                    <div style={{padding:'0.875rem', background:'#fff3cd', borderRadius:'12px', color:'#856404'}}>
                                        No Saturday locations available. Check your Google Sheet.
                                    </div>
                                )
                            )}
                        </div>

                        <div className="section">
                            <label className="checkbox-container" style={{cursor:'default'}}>
                                <span>{post.dogFriendly ? '🐕 Dog friendly' : (post.location.dogReason ? `🚫 No dogs: ${post.location.dogReason}` : '🐕 Dogs — check location')}</span>
                            </label>
                        </div>
                    </div>
                ))}
            </div>

            {errorMsg && (
                <div style={{background:'#fff3cd', border:'1px solid #ffc107', borderRadius:'8px', padding:'0.75rem 1rem', marginBottom:'1rem', color:'#856404', fontSize:'0.9rem'}}>
                    {errorMsg}
                    <button onClick={() => setErrorMsg('')} style={{marginLeft:'1rem', background:'none', border:'none', cursor:'pointer', fontWeight:'700'}}>✕</button>
                </div>
            )}
            <button className="btn" disabled={fetching} onClick={async () => {
                setErrorMsg('');
                try {
                    await fetchAllEnvData(posts);
                } catch(e) {
                    setErrorMsg('⚠️ An error occurred generating posts. Please try again.');
                }
                setShowOutput(true);
            }}>{fetching ? '⏳ Fetching tide & weather data...' : '✨ Generate Posts'}</button>

            {tideStatus && (
                <div style={{marginTop:'0.5rem', fontSize:'0.75rem', color:'#6c757d', padding:'0.5rem 0.75rem', background:'#f8f9fa', borderRadius:'8px', fontFamily:'monospace'}}>
                    🌊 Tide log: {tideStatus}
                </div>
            )}

            {showOutput && (
                <div>
                    <div className="output-grid">
                        {posts.map((post, index) => {
                            const caption = generateCaption(post);
                            const stravaEvent = generateStravaEvent(post);
                            
                            return (
                                <div key={index} className={`preview-card ${post.day.toLowerCase()}`}>
                                <div className={`social-section ${post.day.toLowerCase()}`}>
                                    <div style={{borderBottom:'2px solid rgba(255,255,255,0.3)', paddingBottom:'1rem', marginBottom:'1rem'}}>
                                        <div style={{display:'flex', alignItems:'center', gap:'0.75rem'}}>
                                            <div className={`day-badge ${post.day.toLowerCase()}`} style={{fontSize:'0.85rem', padding:'0.35rem 0.75rem'}}>
                                                {post.day}
                                            </div>
                                            <div className="preview-title" style={{fontSize:'1.1rem', fontWeight:700}}>
                                                Instagram/Facebook
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="preview-content" style={{padding:'1rem', borderRadius:'8px', marginBottom:'1rem', whiteSpace:'pre-wrap', lineHeight:1.6}}>
                                        {caption}
                                    </div>
                                    
                                    <div className="action-buttons">
                                        <button className="copy-btn"
                                                onClick={() => copyToClipboard(caption, index)}>
                                            {copiedIndex === index ? '✓ Copied!' : 'Copy Caption'}
                                        </button>
                                        <button className="download-btn"
                                                onClick={() => downloadInstagramImage(post)}
                                                disabled={!post.photo}>
                                            Download Instagram Image
                                        </button>
                                    </div>
                                </div>

                                <div className="strava-section">
                                    <div className="strava-top">
                                        <div className={`day-badge ${post.day.toLowerCase()}`} style={{fontSize:'0.85rem', padding:'0.35rem 0.75rem'}}>
                                            {post.day}
                                        </div>
                                        <div className="strava-header">🏃 Strava Event Details</div>
                                    </div>
                                    <div className="strava-body">
                                    <div className="strava-field">
                                        <label>Event Title:</label>
                                        <div style={{display:'flex', gap:'0.5rem', alignItems:'flex-start'}}>
                                            <input type="text" value={stravaEvent.title} readOnly style={{flex:1}} />
                                            <button className="strava-copy-btn" onClick={() => copyToClipboard(stravaEvent.title, `strava-title-${index}`)}>
                                                {copiedIndex === `strava-title-${index}` ? '✓' : 'Copy'}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="strava-field">
                                        <label>Location:</label>
                                        <div style={{display:'flex', gap:'0.5rem', alignItems:'flex-start'}}>
                                            <input type="text" value={stravaEvent.location} readOnly style={{flex:1}} />
                                            <button className="strava-copy-btn" onClick={() => copyToClipboard(stravaEvent.location, `strava-loc-${index}`)}>
                                                {copiedIndex === `strava-loc-${index}` ? '✓' : 'Copy'}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="strava-field">
                                        <label>Description:</label>
                                        <div style={{display:'flex', gap:'0.5rem', alignItems:'flex-start'}}>
                                            <textarea value={stravaEvent.description} readOnly rows="5" style={{flex:1}} />
                                            <button className="strava-copy-btn" onClick={() => copyToClipboard(stravaEvent.description, `strava-desc-${index}`)}>
                                                {copiedIndex === `strava-desc-${index}` ? '✓' : 'Copy'}
                                            </button>
                                        </div>
                                    </div>
                                    </div>
                                </div>
                            </div>
                            );
                        })}
                    </div>
                    
                    <div className="email-row">
                        <div className="email-box">
                            <div className="email-box-header">📧 Weekly Email</div>
                            
                            <div style={{marginBottom:'1.5rem'}}>
                                <div style={{fontSize:'0.875rem', fontWeight:'600', color:'var(--forest)', marginBottom:'0.5rem', textTransform:'uppercase'}}>Subject Line</div>
                                <div className="preview-content" style={{padding:'0.75rem', borderRadius:'8px', marginBottom:'0.5rem', whiteSpace:'pre-wrap', lineHeight:1.4, background:'white', fontSize:'0.9rem'}}>
                                    {generateSubjectLine(posts)}
                                </div>
                                <button className="copy-btn" style={{width:'100%', padding:'0.6rem', fontSize:'0.85rem'}}
                                        onClick={() => copyToClipboard(generateSubjectLine(posts), 998)}>
                                    {copiedIndex === 998 ? '✓ Copied!' : 'Copy Subject Line'}
                                </button>
                            </div>
                            
                            <div>
                                <div style={{fontSize:'0.875rem', fontWeight:'600', color:'var(--forest)', marginBottom:'0.5rem', textTransform:'uppercase'}}>Email Body</div>
                                <div className="preview-content" style={{padding:'1rem', borderRadius:'8px', marginBottom:'0.5rem', lineHeight:1.6, background:'white'}}
                                     dangerouslySetInnerHTML={{__html: generateEmailTextHTML(posts)}}>
                                </div>
                                <button className="copy-btn" style={{width:'100%'}}
                                        onClick={() => {
                                            const html = generateEmailTextHTML(posts);
                                            const blob = new Blob([html], {type: 'text/html'});
                                            const plain = generateEmailText(posts);
                                            const blobPlain = new Blob([plain], {type: 'text/plain'});
                                            const item = new ClipboardItem({'text/html': blob, 'text/plain': blobPlain});
                                            navigator.clipboard.write([item]).then(() => setCopiedIndex(999));
                                        }}>
                                    {copiedIndex === 999 ? '✓ Copied!' : 'Copy Email Body'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {copiedIndex !== null && (
                <div className="copied-toast">Copied to clipboard!</div>
            )}
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
